<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#3D7A5E">
    <title>Wellos — Offline</title>
    <style>
      /* Inline styles — design tokens duplicated since this page is served
         straight from /public, outside the Tailwind / CSS-var pipeline.
         Keep in sync with apps/web/app/globals.css if those tokens change.

         Tokens mirrored here:
           --color-surface       ← --surface
           --color-sage          ← --sage
           --color-sage-deep     ← --sage-deep
           --color-ink           ← --ink
           --color-ink-soft      ← --ink-soft
           --color-line          ← --line                                */
      :root {
        --color-surface: #FBF8F2;
        --color-surface-2: #FFFFFF;
        --color-sage: #5D7C66;
        --color-sage-deep: #36523F;
        --color-ink: #1F2A24;
        --color-ink-soft: #5F6E66;
        --color-line: #E2DBCB;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--color-surface);
        color: var(--color-ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      main {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        gap: 20px;
      }

      .lockup {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }

      .lockup-mark {
        display: inline-grid;
        place-items: center;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: var(--color-sage);
        color: var(--color-surface);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
      }

      .lockup-wordmark {
        font-family: Georgia, "Times New Roman", "Iowan Old Style", serif;
        font-size: 22px;
        line-height: 1;
        letter-spacing: -0.01em;
        color: var(--color-ink);
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", "Iowan Old Style", serif;
        font-size: clamp(28px, 6vw, 40px);
        line-height: 1.15;
        letter-spacing: -0.01em;
        color: var(--color-ink);
        font-weight: 500;
      }

      p {
        margin: 0;
        max-width: 360px;
        font-size: 15px;
        line-height: 1.5;
        color: var(--color-ink-soft);
      }

      button {
        appearance: none;
        cursor: pointer;
        margin-top: 8px;
        padding: 12px 22px;
        border-radius: 999px;
        border: 1px solid var(--color-sage-deep);
        background: var(--color-sage);
        color: var(--color-surface);
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.01em;
        transition: background-color 150ms ease, transform 150ms ease;
      }

      button:hover { background: var(--color-sage-deep); }
      button:active { transform: translateY(1px); }
      button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(93, 124, 102, 0.35);
      }

      footer {
        position: fixed;
        bottom: 16px;
        left: 0;
        right: 0;
        font-size: 12px;
        color: var(--color-ink-soft);
        opacity: 0.7;
      }

      @media (prefers-color-scheme: dark) {
        /* Wellos brand stays warm-light even in dark mode for now; matching
           the rest of the booking surface. If the broader app gains a dark
           theme later, mirror its tokens here. */
      }
    </style>
  </head>
  <body>
    <main>
      <div class="lockup" aria-hidden="true">
        <span class="lockup-mark">
          <!-- Matches LeafIcon in apps/web/app/admin/_shell/icons.tsx.
               Stroke 1.6, currentColor, viewBox 0 0 24 24. -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M4 20c0-9 6-15 16-15-1 11-7 16-16 15z" />
            <path d="M4 20c4-5 8-8 14-10" />
          </svg>
        </span>
        <span class="lockup-wordmark">Wellos</span>
      </div>

      <h1>You&rsquo;re offline</h1>
      <p>Some features need a connection. Try again when you&rsquo;re back online.</p>

      <button type="button" onclick="location.reload()">Try again</button>
    </main>

    <footer>Wellos works offline once you&rsquo;ve visited a page.</footer>
  </body>
</html>
