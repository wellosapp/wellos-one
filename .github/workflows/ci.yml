name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # pnpm version comes from the `packageManager` field in package.json
      # (do NOT set `version:` here — pnpm/action-setup errors if both are
      # present: "Multiple versions of pnpm specified")
      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Build is run last so we can see lint/typecheck/test failures even
      # when the build itself works.
      - name: Build
        run: pnpm build
